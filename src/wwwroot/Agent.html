<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Control — Thio Universal Agent</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/agent.css">
</head>
<body>

    <header>
        <a href="/">&larr; Home</a>
        <h1>Agent Control</h1>
        <div style="margin-left:auto;display:flex;align-items:center;gap:14px;">
            <span id="model-badge" style="font-size:11px;color:#4a6a8a;font-family:'Cascadia Code','Consolas',monospace;"></span>
            <a href="/Config.html" style="font-size:12px;color:#888;text-decoration:none;border:1px solid #333;border-radius:4px;padding:4px 10px;" title="Open Configuration">⚙ Config</a>
        </div>
    </header>

    <div class="controls">
        <select id="monitor-select" title="Monitor to capture"></select>
        <input type="text" id="goal-input" placeholder="Enter a goal for the AI agent..." />
        <div class="controls-actions">
            <div class="control-buttons">
                <button id="btn-start">Start</button>
                <button id="btn-pause" disabled>Pause</button>
                <button id="btn-stop" disabled>Stop</button>
                <button id="btn-new-session" style="background:#2a2a2a;color:#888;border:1px solid #444;border-radius:6px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;" title="Stop current session and clear output">New Session</button>
            </div>
            <div class="hotkey-strip" id="hotkey-strip" hidden>
                <span class="hotkey-label" id="hotkey-strip-label">Global hotkeys</span>
                <span class="hotkey-chip" id="pause-hotkey-chip"></span>
                <span class="hotkey-chip stop" id="stop-hotkey-chip"></span>
            </div>
        </div>
    </div>

    <div class="mode-banner pending" id="human-mode-banner" aria-live="polite">
        <span class="mode-banner-kicker">Human Control Only Mode</span>
        <span class="mode-banner-state" id="human-mode-state">Loading</span>
        <span class="mode-banner-text" id="human-mode-text">Checking configuration...</span>
    </div>

    <div class="status-bar">
        <div class="status-dot idle" id="status-dot"></div>
        <span id="status-text">Idle</span>
        <span id="step-counter"></span>
        <span id="token-counter"></span>
        <span id="cost-counter"></span>
        <span id="elapsed-timer"></span>
    </div>

    <div id="countdown-banner" style="display:none;">
        <span>▶ Resuming in</span>
        <span class="countdown-num" id="countdown-num">5</span>
        <span>seconds&hellip;</span>
        <button id="btn-skip-countdown" title="Skip countdown and execute now">Skip</button>
    </div>

    <div id="guidance-panel">
        <label for="guidance-input">&#128172; Guidance</label>
        <input type="text" id="guidance-input" placeholder="Send a mid-session instruction to the AI&hellip;" />
        <label class="guidance-cancel-wrap" title="Cancel the next pending action and redirect the AI with your guidance">
            <input type="checkbox" id="guidance-cancel" />
            <span>Cancel next action</span>
        </label>
        <button id="btn-guidance">Send</button>
        <span class="guidance-ack" id="guidance-ack">&#10003; Queued</span>
    </div>

    <div class="prompt-banner" id="prompt-banner" style="display:none;">
        <details id="prompt-details">
            <summary>Goal&nbsp;<span class="prompt-preview" id="prompt-preview"></span></summary>
            <div class="prompt-full" id="prompt-full"></div>
        </details>
    </div>

    <main>
        <section class="agent-main-top">
            <div class="final-result" id="final-result"><span class="final-result-msg" id="final-result-msg"></span><span class="final-result-time" id="final-result-time"></span></div>

            <div class="session-activity idle" id="session-activity" hidden aria-live="polite">
                <div class="session-activity-main">
                    <div class="session-activity-indicator" aria-hidden="true">
                        <span class="session-activity-spinner"></span>
                    </div>
                    <div class="session-activity-copy">
                        <div class="session-activity-label" id="session-activity-label">Agent Activity</div>
                        <div class="session-activity-text" id="session-activity-text"></div>
                        <div class="session-activity-detail" id="session-activity-detail"></div>
                    </div>
                </div>
                <div class="live-substeps" id="live-substeps"></div>
            </div>

            <div class="current-step" id="current-step">
                <h2>Most Recent Step</h2>
                <div class="thought" id="current-thought">No completed steps yet.</div>
                <div class="action" id="current-action" style="display:none;"></div>
                <div class="result" id="current-result">The latest finished instruction will appear here.</div>
            </div>
        </section>

        <section class="step-history-panel">
            <div class="step-log-header"><span>Step History</span><button id="btn-copy-steps" title="Copy all steps as JSON">Copy</button></div>
            <div class="step-log" id="step-log"></div>
        </section>
    </main>

    <script type="module" src="/js/agent.js"></script>

</body>
</html>
